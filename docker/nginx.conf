server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Keep redirects relative so the original host/port (and proxy-set host) is preserved
    absolute_redirect off;

    # Landing page at /
    location = / {
        try_files /index.html =404;
    }

    # Trailing-slash redirect for Storybook
    location = /storybook {
        return 301 /storybook/;
    }

    # Storybook SPA — scoped fallback to its own index.html
    location /storybook/ {
        try_files $uri $uri/ /storybook/index.html;
    }

    # UI kit CSS exposed at /uikit/ so the landing can <link> it
    location /uikit/ {
        try_files $uri =404;
    }

    # Long-cache static assets (HTML excluded so landing updates are picked up)
    location ~* \.(css|js|woff2?|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
